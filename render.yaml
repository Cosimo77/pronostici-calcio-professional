services:
  # Web Service Principale - App Professional
  - type: web
    name: pronostici-calcio-pro
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120 --worker-class gevent web.app_professional:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pronostici-calcio-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ODDS_API_KEY
        value: 7109a3c71a972ef639c56bcf0b13bb4b
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /api/health
    numInstances: 1

databases:
  - name: pronostici-calcio-db
    plan: free
    databaseName: pronostici_calcio_production
    user: postgres
