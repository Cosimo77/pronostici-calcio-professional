<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partite Prossime - Serie A Professional</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.5em;
        }
        
        .loading i {
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .date-section {
            margin-bottom: 30px;
        }
        
        .date-header {
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            padding: 15px 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .date-header h2 {
            color: #667eea;
            font-size: 1.5em;
            margin: 0;
            font-weight: 600;
        }
        
        .match-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        
        .match-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 3px solid #667eea;
        }
        
        .teams {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
        }
        
        .match-time {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
        }
        
        .odds-banner {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            text-align: center;
        }
        
        .odds-banner h4 {
            font-size: 0.9em;
            margin-bottom: 5px;
            opacity: 0.9;
        }
        
        .odds-banner .price {
            font-size: 1.8em;
            font-weight: bold;
        }
        
        .market-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #667eea;
            margin-bottom: 15px;
        }
        
        .market-box h3 {
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .prediction-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .prediction-item:last-child {
            margin-bottom: 0;
        }
        
        .pred-label {
            font-weight: 600;
            color: #333;
        }
        
        .pred-value {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .confidence {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.9em;
            font-weight: bold;
        }
        
        .value-bet-banner {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }
        
        .value-bet-banner h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        
        .value-bet-banner .detail {
            font-size: 1.1em;
            opacity: 0.95;
        }
        
        .info-banner {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        
        .info-banner h3 {
            color: #856404;
            font-size: 1em;
            margin-bottom: 8px;
        }
        
        .info-banner p {
            color: #856404;
            font-size: 0.9em;
            line-height: 1.5;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚽ Partite Prossime Serie A</h1>
            <p>Quote reali da 25+ bookmaker · Predizioni ML · Value Betting</p>
        </div>
        
        <div class="info-banner">
            <h3>📊 Dati in tempo reale</h3>
            <p>Quote aggiornate automaticamente. Predizioni basate su modelli ML addestrati su 2.920 partite. Sistema value betting per identificare opportunità con EV positivo.</p>
        </div>
        
        <div id="matches-container">
            <div class="loading">
                Caricamento partite...
            </div>
        </div>
    </div>

    <script>
        function loadMatches() {
            fetch('/api/upcoming_matches')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('matches-container');
                    
                    if (!data.matches || data.matches.length === 0) {
                        container.innerHTML = '<div class="loading">Nessuna partita disponibile al momento</div>';
                        return;
                    }
                    
                    // Raggruppa per data
                    const byDate = {};
                    data.matches.forEach(match => {
                        const dateKey = match.commence_time.split('T')[0];
                        if (!byDate[dateKey]) {
                            byDate[dateKey] = [];
                        }
                        byDate[dateKey].push(match);
                    });
                    
                    // Genera HTML
                    let html = '';
                    Object.keys(byDate).sort().forEach(dateKey => {
                        const date = new Date(dateKey);
                        const dateFormatted = date.toLocaleDateString('it-IT', {
                            weekday: 'long',
                            day: 'numeric',
                            month: 'long',
                            year: 'numeric'
                        });
                        
                        html += `
                            <div class="date-section">
                                <div class="date-header">
                                    <h2>📅 ${dateFormatted}</h2>
                                </div>
                        `;
                        
                        byDate[dateKey].forEach(match => {
                            // Estrai dati
                            const oddsReal = match.odds_real || {};
                            const oddsHome = oddsReal.home || 0;
                            const oddsDraw = oddsReal.draw || 0;
                            const oddsAway = oddsReal.away || 0;
                            const nBookmakers = oddsReal.n_bookmakers || 0;
                            
                            const oddsTotals = match.odds_totals || {};
                            const oddsOver = oddsTotals.over_25 || 0;
                            const oddsUnder = oddsTotals.under_25 || 0;
                            
                            const markets = match.markets || {};
                            const mercati = markets.mercati || {};
                            const m1x2 = mercati.m1x2 || {};
                            const prob = m1x2.probabilita || {};
                            const consiglio = m1x2.consiglio || '';
                            const confidenza = (markets.confidenza * 100) || 0;
                            
                            const analysis = match.analysis || {};
                            const hasValue = analysis.has_value;
                            const bestEV = analysis.best_expected_value || 0;
                            const bestMarket = analysis.best_market || '';
                            const bestOutcome = analysis.best_outcome || '';
                            const bestOdds = analysis.best_odds || 0;
                            
                            const isRealValue = hasValue && bestEV > 0;
                            
                            const time = new Date(match.commence_time).toLocaleTimeString('it-IT', {
                                hour: '2-digit',
                                minute: '2-digit'
                            });
                            
                            // Converti consiglio in label
                            const consiglioMap = {
                                'H': 'Casa',
                                'D': 'Pareggio',
                                'A': 'Trasferta'
                            };
                            const consiglioLabel = consiglioMap[consiglio] || consiglio;
                            
                            html += `
                                <div class="match-card">
                                    <div class="match-header">
                                        <div class="teams">${match.home_team} vs ${match.away_team}</div>
                                        <div class="match-time">⏰ ${time}</div>
                                    </div>
                                    
                                    <div class="odds-banner">
                                        <div>
                                            <h4>Casa</h4>
                                            <div class="price">${oddsHome.toFixed(2)}</div>
                                        </div>
                                        <div>
                                            <h4>Pareggio</h4>
                                            <div class="price">${oddsDraw.toFixed(2)}</div>
                                        </div>
                                        <div>
                                            <h4>Trasferta</h4>
                                            <div class="price">${oddsAway.toFixed(2)}</div>
                                        </div>
                                    </div>
                                    
                                    <div class="market-box">
                                        <h3>🤖 Predizione ML</h3>
                                        <div class="prediction-item">
                                            <span class="pred-label">Casa</span>
                                            <div class="pred-value">
                                                <span class="confidence">${(prob.H * 100 || 0).toFixed(1)}%</span>
                                            </div>
                                        </div>
                                        <div class="prediction-item">
                                            <span class="pred-label">Pareggio</span>
                                            <div class="pred-value">
                                                <span class="confidence">${(prob.D * 100 || 0).toFixed(1)}%</span>
                                            </div>
                                        </div>
                                        <div class="prediction-item">
                                            <span class="pred-label">Trasferta</span>
                                            <div class="pred-value">
                                                <span class="confidence">${(prob.A * 100 || 0).toFixed(1)}%</span>
                                            </div>
                                        </div>
                                        <div class="prediction-item" style="background: #e3f2fd;">
                                            <span class="pred-label"><strong>Consiglio:</strong> ${consiglioLabel}</span>
                                            <div class="pred-value">
                                                <span class="confidence" style="background: #667eea;">Confidenza ${confidenza.toFixed(1)}%</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    ${isRealValue ? `
                                        <div class="value-bet-banner">
                                            <h3>💎 Opportunità Value Betting</h3>
                                            <div class="detail">
                                                <strong>${bestMarket}: ${bestOutcome}</strong> @ ${bestOdds.toFixed(2)}
                                                · Expected Value: <strong>+${bestEV.toFixed(1)}%</strong>
                                            </div>
                                        </div>
                                    ` : ''}
                                </div>
                            `;
                        });
                        
                        html += '</div>';
                    });
                    
                    container.innerHTML = html;
                })
                .catch(error => {
                    console.error('Errore caricamento:', error);
                    document.getElementById('matches-container').innerHTML = 
                        '<div class="loading">❌ Errore nel caricamento dei dati</div>';
                });
        }
        
        // Carica al caricamento pagina
        loadMatches();
    </script>
</body>
</html>
