<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partite Prossime - Serie A Professional</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.5em;
        }
        
        .loading i {
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .date-section {
            margin-bottom: 30px;
        }
        
        .date-header {
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            padding: 15px 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .date-header h2 {
            color: #667eea;
            font-size: 1.5em;
            margin: 0;
            font-weight: 600;
        }
        
        .match-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        
        .match-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 3px solid #667eea;
        }
        
        .teams {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
        }
        
        .match-time {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
        }
        
        .odds-banner {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            text-align: center;
        }
        
        .odds-banner h4 {
            font-size: 0.9em;
            margin-bottom: 5px;
            opacity: 0.9;
        }
        
        .odds-banner .price {
            font-size: 1.8em;
            font-weight: bold;
        }
        
        .market-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #667eea;
            margin-bottom: 15px;
        }
        
        .market-box h3 {
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .prediction-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .prediction-item:last-child {
            margin-bottom: 0;
        }
        
        .pred-label {
            font-weight: 600;
            color: #333;
        }
        
        .pred-value {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .confidence {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.9em;
            font-weight: bold;
        }
        
        .value-bet-banner {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }
        
        .value-bet-banner h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        
        .value-bet-banner .detail {
            font-size: 1.1em;
            opacity: 0.95;
        }
        
        .info-banner {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        
        .info-banner h3 {
            color: #856404;
            font-size: 1em;
            margin-bottom: 8px;
        }
        
        .info-banner p {
            color: #856404;
            font-size: 0.9em;
            line-height: 1.5;
            margin: 0;
        }
        
        /* FASE 2 Opportunità */
        .opportunities-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .opportunities-section h2 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .opportunities-section .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 1.1em;
        }
        
        .opportunity-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .opportunity-card.double-chance {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        .opportunity-card.pareggio {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .opportunity-card.over-under {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }
        
        .opp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }
        
        .opp-match {
            font-size: 1.3em;
            font-weight: 600;
        }
        
        .opp-time {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .opp-details {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .opp-detail {
            text-align: center;
        }
        
        .opp-detail-label {
            font-size: 0.85em;
            opacity: 0.9;
            margin-bottom: 5px;
        }
        
        .opp-detail-value {
            font-size: 1.4em;
            font-weight: 700;
        }
        
        .opp-bet {
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 12px;
            font-size: 1.1em;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .opp-strategy {
            font-size: 0.85em;
            opacity: 0.9;
            text-align: center;
        }
        
        .roi-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 600;
            background: rgba(255,255,255,0.3);
            margin-left: 8px;
        }
        
        .no-opportunities {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
        
        .no-opportunities h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .fase2-badge {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            display: inline-block;
            margin: 5px 5px 5px 0;
        }
        
        .fase2-badge.high-roi {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        .fase2-badge.medium-roi {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .fase2-badge.low-roi {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚽ Partite Prossime Serie A</h1>
            <p>Quote reali da 25+ bookmaker · Predizioni ML · Value Betting FASE 2</p>
        </div>
        
        <div class="info-banner">
            <h3>📊 Dati in tempo reale</h3>
            <p>Quote aggiornate automaticamente. Predizioni basate su modelli ML addestrati su 2.920 partite. Sistema value betting FASE 2 con ROI backtest +7% a +75%.</p>
        </div>
        
        <!-- SEZIONE OPPORTUNITÀ FASE 2 -->
        <div id="opportunities-section" style="display: none;">
            <!-- Popolato dinamicamente -->
        </div>
        
        <div id="matches-container">
            <div class="loading">
                Caricamento partite...
            </div>
        </div>
    </div>

    <script>
        function loadMatches() {
            fetch('/api/upcoming_matches')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('matches-container');
                    
                    // Gestione errori configurazione
                    if (data.error) {
                        let errorMsg = '<div class="loading" style="color: #ff6b6b;">';
                        errorMsg += '<h3>⚠️ Configurazione Richiesta</h3>';
                        errorMsg += `<p><strong>Errore:</strong> ${data.error}</p>`;
                        if (data.hint) {
                            errorMsg += `<p><strong>Soluzione:</strong> ${data.hint}</p>`;
                        }
                        errorMsg += '<p style="margin-top: 20px; font-size: 0.9em; color: #666;">Per configurare ODDS_API_KEY su Render:<br>';
                        errorMsg += '1. Vai su <a href="https://dashboard.render.com" target="_blank">Render Dashboard</a><br>';
                        errorMsg += '2. Seleziona il servizio → Environment<br>';
                        errorMsg += '3. Aggiungi variabile: ODDS_API_KEY = [tua chiave da <a href="https://the-odds-api.com" target="_blank">The Odds API</a>]</p>';
                        errorMsg += '</div>';
                        container.innerHTML = errorMsg;
                        return;
                    }
                    
                    if (!data.matches || data.matches.length === 0) {
                        container.innerHTML = '<div class="loading">😴 Nessuna partita disponibile al momento<br><small style="color: #666; margin-top: 10px; display: block;">Controlla più tardi per nuove partite Serie A</small></div>';
                        return;
                    }
                    
                    // FASE 2: Mostra opportunità validate
                    displayOpportunities(data.matches);
                    
                    // Raggruppa per data
                    const byDate = {};
                    data.matches.forEach(match => {
                        const dateKey = match.commence_time.split('T')[0];
                        if (!byDate[dateKey]) {
                            byDate[dateKey] = [];
                        }
                        byDate[dateKey].push(match);
                    });
                    
                    // Genera HTML
                    let html = '';
                    Object.keys(byDate).sort().forEach(dateKey => {
                        const date = new Date(dateKey);
                        const dateFormatted = date.toLocaleDateString('it-IT', {
                            weekday: 'long',
                            day: 'numeric',
                            month: 'long',
                            year: 'numeric'
                        });
                        
                        html += `
                            <div class="date-section">
                                <div class="date-header">
                                    <h2>📅 ${dateFormatted}</h2>
                                </div>
                        `;
                        
                        byDate[dateKey].forEach(match => {
                            // Estrai dati
                            const oddsReal = match.odds_real || {};
                            const oddsHome = oddsReal.home || 0;
                            const oddsDraw = oddsReal.draw || 0;
                            const oddsAway = oddsReal.away || 0;
                            const nBookmakers = oddsReal.n_bookmakers || 0;
                            
                            const oddsTotals = match.odds_totals || {};
                            const oddsOver = oddsTotals.over_25 || 0;
                            const oddsUnder = oddsTotals.under_25 || 0;
                            
                            const markets = match.markets || {};
                            const mercati = markets.mercati || {};
                            const m1x2 = mercati.m1x2 || {};
                            const prob = m1x2.probabilita || {};
                            const consiglio = m1x2.consiglio || '';
                            const confidenza = (markets.confidenza * 100) || 0;
                            
                            const analysis = match.analysis || {};
                            const hasValue = analysis.has_value;
                            const bestEV = analysis.best_expected_value || 0;
                            const bestMarket = analysis.best_market || '';
                            const bestOutcome = analysis.best_outcome || '';
                            const bestOdds = analysis.best_odds || 0;
                            
                            const isRealValue = hasValue && bestEV > 0;
                            
                            const time = new Date(match.commence_time).toLocaleTimeString('it-IT', {
                                hour: '2-digit',
                                minute: '2-digit'
                            });
                            
                            // Converti consiglio in label
                            const consiglioMap = {
                                'H': 'Casa',
                                'D': 'Pareggio',
                                'A': 'Trasferta'
                            };
                            const consiglioLabel = consiglioMap[consiglio] || consiglio;
                            
                            // HTML predizione ML (se disponibile)
                            let predictionHTML = '';
                            if (match.has_prediction === false) {
                                predictionHTML = `
                                    <div class="market-box" style="background: #fff3cd;">
                                        <h3>⚠️ Predizione Non Disponibile</h3>
                                        <p style="color: #856404; margin: 10px 0;">${match.no_prediction_reason || 'Dati insufficienti'}</p>
                                        <p style="font-size: 0.9em; color: #666;">Quote bookmaker comunque mostrate sopra.</p>
                                    </div>
                                `;
                            } else {
                                predictionHTML = `
                                    <div class="market-box">
                                        <h3>🤖 Predizione ML</h3>
                                        <div class="prediction-item">
                                            <span class="pred-label">Casa</span>
                                            <div class="pred-value">
                                                <span class="confidence">${(prob.H * 100 || 0).toFixed(1)}%</span>
                                            </div>
                                        </div>
                                        <div class="prediction-item">
                                            <span class="pred-label">Pareggio</span>
                                            <div class="pred-value">
                                                <span class="confidence">${(prob.D * 100 || 0).toFixed(1)}%</span>
                                            </div>
                                        </div>
                                        <div class="prediction-item">
                                            <span class="pred-label">Trasferta</span>
                                            <div class="pred-value">
                                                <span class="confidence">${(prob.A * 100 || 0).toFixed(1)}%</span>
                                            </div>
                                        </div>
                                        <div class="recommendation">
                                            <strong>Consiglio:</strong> ${consiglioLabel} (${confidenza.toFixed(1)}% confidenza)
                                        </div>
                                    </div>
                                `;
                            }
                            
                            html += `
                                <div class="match-card">
                                    <div class="match-header">
                                        <div class="teams">${match.home_team_display || match.home_team} vs ${match.away_team_display || match.away_team}</div>
                                        <div class="match-time">⏰ ${time}</div>
                                    </div>
                                    
                                    <div class="odds-banner">
                                        <div>
                                            <h4>Casa</h4>
                                            <div class="price">${oddsHome.toFixed(2)}</div>
                                        </div>
                                        <div>
                                            <h4>Pareggio</h4>
                                            <div class="price">${oddsDraw.toFixed(2)}</div>
                                        </div>
                                        <div>
                                            <h4>Trasferta</h4>
                                            <div class="price">${oddsAway.toFixed(2)}</div>
                                        </div>
                                    </div>
                                    
                                    ${predictionHTML}
                                    
                                    ${(() => {
                                        // Mostra opportunità FASE 2 se presenti
                                        const vb = match.value_betting || {};
                                        if (vb.fase2_validated && vb.fase2_opportunities && vb.fase2_opportunities.length > 0) {
                                            let oppHTML = '<div style="margin-top: 20px;">';
                                            oppHTML += '<h3 style="color: #667eea; margin-bottom: 15px;">🎯 Opportunità FASE 2 Validate</h3>';
                                            
                                            vb.fase2_opportunities.forEach((opp, idx) => {
                                                let badgeClass = 'low-roi';
                                                if (opp.roi_backtest > 50) badgeClass = 'high-roi';
                                                else if (opp.roi_backtest > 10) badgeClass = 'medium-roi';
                                                
                                                oppHTML += `
                                                    <div class="fase2-badge ${badgeClass}">
                                                        ${opp.market}: ${opp.outcome} @ ${opp.odds.toFixed(2)}
                                                        · EV +${opp.ev.toFixed(1)}%
                                                        · ROI Backtest +${opp.roi_backtest.toFixed(1)}%
                                                    </div>
                                                `;
                                            });
                                            
                                            oppHTML += '</div>';
                                            return oppHTML;
                                        } else if (isRealValue) {
                                            // Fallback al vecchio value betting se non ha FASE 2
                                            return `
                                                <div class="value-bet-banner">
                                                    <h3>💎 Opportunità Value Betting</h3>
                                                    <div class="detail">
                                                        <strong>${bestMarket}: ${bestOutcome}</strong> @ ${bestOdds.toFixed(2)}
                                                        · Expected Value: <strong>+${bestEV.toFixed(1)}%</strong>
                                                    </div>
                                                </div>
                                            `;
                                        }
                                        return '';
                                    })()}
                                </div>
                            `;
                        });
                        
                        html += '</div>';
                    });
                    
                    container.innerHTML = html;
                })
                .catch(error => {
                    console.error('Errore caricamento:', error);
                    document.getElementById('matches-container').innerHTML = 
                        '<div class="loading">❌ Errore nel caricamento dei dati</div>';
                });
        }
        
        function displayOpportunities(matches) {
            const oppSection = document.getElementById('opportunities-section');
            
            // Trova tutte le opportunità FASE 2
            const opportunities = [];
            matches.forEach(match => {
                const vb = match.value_betting || {};
                if (vb.fase2_validated && vb.fase2_opportunities && vb.fase2_opportunities.length > 0) {
                    vb.fase2_opportunities.forEach(opp => {
                        opportunities.push({
                            match: match,
                            opportunity: opp
                        });
                    });
                }
            });
            
            if (opportunities.length === 0) {
                oppSection.innerHTML = `
                    <div class="opportunities-section">
                        <h2>🎯 Scommesse Consigliate FASE 2</h2>
                        <div class="no-opportunities">
                            <h3>⚠️ Nessuna opportunità validata al momento</h3>
                            <p>I filtri FASE 2 sono molto conservativi (ROI backtest da +7% a +75%)</p>
                            <p style="margin-top: 10px;">Controlla più tardi per nuove opportunità validate</p>
                        </div>
                    </div>
                `;
                oppSection.style.display = 'block';
                return;
            }
            
            // Ordina per ROI backtest (più alto prima)
            opportunities.sort((a, b) => b.opportunity.roi_backtest - a.opportunity.roi_backtest);
            
            let html = `
                <div class="opportunities-section">
                    <h2>🎯 Scommesse Consigliate FASE 2</h2>
                    <p class="subtitle">Opportunità validate con ROI backtest positivo · ${opportunities.length} segnale/i trovato/i</p>
            `;
            
            opportunities.forEach((item, index) => {
                const match = item.match;
                const opp = item.opportunity;
                
                const time = new Date(match.commence_time).toLocaleString('it-IT', {
                    day: 'numeric',
                    month: 'short',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                // Classe card in base alla strategia
                let cardClass = '';
                if (opp.strategy === 'FASE2_DOUBLE_CHANCE') cardClass = 'double-chance';
                else if (opp.strategy === 'FASE1_PAREGGIO') cardClass = 'pareggio';
                else if (opp.strategy === 'FASE2_OVER_UNDER') cardClass = 'over-under';
                
                // Badge ROI
                let roiEmoji = '';
                if (opp.roi_backtest > 50) roiEmoji = '🏆';
                else if (opp.roi_backtest > 10) roiEmoji = '📈';
                else roiEmoji = '💰';
                
                html += `
                    <div class="opportunity-card ${cardClass}">
                        <div class="opp-header">
                            <div class="opp-match">
                                ${index + 1}. ${match.home_team_display || match.home_team} vs ${match.away_team_display || match.away_team}
                            </div>
                            <div class="opp-time">📅 ${time}</div>
                        </div>
                        
                        <div class="opp-bet">
                            🎯 <strong>${opp.market}: ${opp.outcome}</strong>
                        </div>
                        
                        <div class="opp-details">
                            <div class="opp-detail">
                                <div class="opp-detail-label">Quota</div>
                                <div class="opp-detail-value">${opp.odds.toFixed(2)}</div>
                            </div>
                            <div class="opp-detail">
                                <div class="opp-detail-label">Expected Value</div>
                                <div class="opp-detail-value">${opp.ev > 0 ? '+' : ''}${opp.ev.toFixed(1)}%</div>
                            </div>
                            <div class="opp-detail">
                                <div class="opp-detail-label">${roiEmoji} ROI Backtest</div>
                                <div class="opp-detail-value">+${opp.roi_backtest.toFixed(1)}%</div>
                            </div>
                        </div>
                        
                        <div class="opp-strategy">
                            📊 Probabilità modello: ${opp.prob_model.toFixed(1)}% · Strategia: ${opp.strategy.replace('FASE2_', '').replace('FASE1_', '').replace('_', ' ')}
                        </div>
                    </div>
                `;
            });
            
            html += `
                    <div class="info-banner" style="margin-top: 20px;">
                        <h3>💡 Come usare questi segnali</h3>
                        <p><strong>1.</strong> Punta SOLO sulle opportunità con ROI Backtest positivo<br>
                        <strong>2.</strong> Max 2% del bankroll per scommessa<br>
                        <strong>3.</strong> Double Chance (verde) = ROI +75% ma quote basse<br>
                        <strong>4.</strong> Pareggi (rosa) = ROI +7% con quote medie<br>
                        <strong>5.</strong> Over/Under (arancio) = ROI +6% con quote interessanti<br>
                        <strong>⚠️</strong> Performance passate non garantiscono risultati futuri</p>
                    </div>
                </div>
            `;
            
            oppSection.innerHTML = html;
            oppSection.style.display = 'block';
        }
        
        // Carica al caricamento pagina
        loadMatches();
    </script>
</body>
</html>
