<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Value Betting - Raccomandazioni Smart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .roi-banner {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .roi-banner h2 {
            color: #2ecc71;
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .roi-banner p {
            color: #555;
            font-size: 1.1em;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .stat-card .label {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .stat-card .value {
            color: #333;
            font-size: 1.8em;
            font-weight: bold;
        }
        
        .match-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            border-left: 5px solid #ddd;
            transition: transform 0.2s;
        }
        
        .match-card:hover {
            transform: translateY(-5px);
        }
        
        .match-card.bet {
            border-left-color: #2ecc71;
        }
        
        .match-card.skip {
            border-left-color: #e74c3c;
            opacity: 0.7;
        }
        
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .match-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }
        
        .match-time {
            color: #888;
            font-size: 0.9em;
        }
        
        .odds-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .odd-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        
        .odd-box .label {
            color: #666;
            font-size: 0.85em;
            margin-bottom: 5px;
        }
        
        .odd-box .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
        }
        
        .ev-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .ev-box {
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }
        
        .ev-box.positive {
            background: #d4edda;
            color: #155724;
        }
        
        .ev-box.negative {
            background: #f8d7da;
            color: #721c24;
        }
        
        .ev-box .label {
            font-size: 0.85em;
            margin-bottom: 5px;
            opacity: 0.8;
        }
        
        .ev-box .value {
            font-size: 1.5em;
        }
        
        .recommendation {
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
        }
        
        .recommendation.bet {
            background: #2ecc71;
            color: white;
        }
        
        .recommendation.skip {
            background: #e74c3c;
            color: white;
        }
        
        .recommendation .icon {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .recommendation .details {
            font-size: 0.9em;
            margin-top: 10px;
            opacity: 0.9;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.5em;
            padding: 50px;
        }
        
        .error {
            background: #e74c3c;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }
        
        .summary {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }
        
        .summary h2 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .bet-list {
            list-style: none;
        }
        
        .bet-item {
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #2ecc71;
        }
        
        .bet-item .match {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .bet-item .action {
            color: #2ecc71;
            font-weight: bold;
        }
        
        .bet-item .roi {
            color: #666;
            font-size: 0.9em;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Value Betting System</h1>
            <p class="subtitle">Raccomandazioni Smart basate su Machine Learning</p>
        </div>
        
        <div class="roi-banner">
            <h2>+5.98% ROI Validato</h2>
            <p>Sistema testato su 363 partite Serie A • Batte i bookmaker di +13.16 punti percentuali</p>
        </div>
        
        <div id="loading" class="loading">
            ⏳ Caricamento partite e analisi value betting...
        </div>
        
        <div id="error" class="hidden"></div>
        
        <div id="stats" class="stats-grid hidden"></div>
        
        <div id="summary" class="summary hidden"></div>
        
        <div id="matches"></div>
    </div>
    
    <script>
        async function loadMatches() {
            try {
                const response = await fetch('/api/upcoming_matches');
                const data = await response.json();
                
                document.getElementById('loading').classList.add('hidden');
                
                if (!response.ok) {
                    throw new Error(data.error || 'Errore nel caricamento');
                }
                
                if (!data.matches || data.matches.length === 0) {
                    document.getElementById('error').innerHTML = `
                        <div class="error">
                            ⚠️ Nessuna partita disponibile al momento
                        </div>
                    `;
                    document.getElementById('error').classList.remove('hidden');
                    return;
                }
                
                // Mostra statistiche
                displayStats(data);
                
                // Mostra riepilogo
                displaySummary(data.matches);
                
                // Mostra partite
                displayMatches(data.matches);
                
            } catch (error) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').innerHTML = `
                    <div class="error">
                        ❌ ${error.message}
                        <br><br>
                        <small>Assicurati di aver configurato ODDS_API_KEY</small>
                    </div>
                `;
                document.getElementById('error').classList.remove('hidden');
            }
        }
        
        function displayStats(data) {
            const stats = document.getElementById('stats');
            stats.innerHTML = `
                <div class="stat-card">
                    <div class="label">Partite Disponibili</div>
                    <div class="value">${data.matches.length}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Fonte Dati</div>
                    <div class="value" style="font-size: 1em;">The Odds API</div>
                </div>
                <div class="stat-card">
                    <div class="label">Quote Usate</div>
                    <div class="value">${data.api_quota?.used || 'N/A'}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Quote Rimaste</div>
                    <div class="value">${data.api_quota?.remaining || 'N/A'}</div>
                </div>
            `;
            stats.classList.remove('hidden');
        }
        
        function displaySummary(matches) {
            const betMatches = matches.filter(m => {
                const evs = m.value_betting.expected_values;
                return Math.max(evs.home, evs.draw, evs.away) > 0;
            }).sort((a, b) => {
                const maxA = Math.max(a.value_betting.expected_values.home, 
                                     a.value_betting.expected_values.draw,
                                     a.value_betting.expected_values.away);
                const maxB = Math.max(b.value_betting.expected_values.home,
                                     b.value_betting.expected_values.draw,
                                     b.value_betting.expected_values.away);
                return maxB - maxA;
            });
            
            const summary = document.getElementById('summary');
            
            if (betMatches.length > 0) {
                let html = `
                    <h2>🎲 Riepilogo Raccomandazioni (${betMatches.length} partite con valore)</h2>
                    <ul class="bet-list">
                `;
                
                betMatches.forEach(match => {
                    const evs = match.value_betting.expected_values;
                    const bestEV = Math.max(evs.home, evs.draw, evs.away);
                    const bestOutcome = evs.home === bestEV ? 'Casa' : (evs.draw === bestEV ? 'Pareggio' : 'Trasferta');
                    const oddKey = evs.home === bestEV ? 'home' : (evs.draw === bestEV ? 'draw' : 'away');
                    
                    html += `
                        <li class="bet-item">
                            <div class="match">${match.home_team} vs ${match.away_team}</div>
                            <div class="action">→ Punta su: ${bestOutcome} (quota ${match.odds_real[oddKey].toFixed(2)})</div>
                            <div class="roi">💰 ROI atteso: +${bestEV.toFixed(1)}% | Con 100€ guadagni ${bestEV.toFixed(1)}€ nel lungo periodo</div>
                        </li>
                    `;
                });
                
                html += `
                    </ul>
                    <p style="margin-top: 20px; color: #666; text-align: center;">
                        💡 <strong>Regola d'oro:</strong> Scommetti SOLO su partite con EV positivo!
                    </p>
                `;
                
                summary.innerHTML = html;
            } else {
                summary.innerHTML = `
                    <h2>⚠️ Nessuna opportunità oggi</h2>
                    <p style="color: #666; text-align: center;">Tutte le partite hanno Expected Value negativo. Meglio non scommettere oggi!</p>
                `;
            }
            
            summary.classList.remove('hidden');
        }
        
        function displayMatches(matches) {
            const container = document.getElementById('matches');
            
            matches.forEach(match => {
                const evs = match.value_betting.expected_values;
                const bestEV = Math.max(evs.home, evs.draw, evs.away);
                const bestOutcome = evs.home === bestEV ? 'Casa' : (evs.draw === bestEV ? 'Pareggio' : 'Trasferta');
                const isBet = bestEV > 0;
                
                const date = new Date(match.commence_time);
                const timeStr = date.toLocaleString('it-IT', { 
                    weekday: 'short', 
                    day: 'numeric', 
                    month: 'short', 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
                
                const card = document.createElement('div');
                card.className = `match-card ${isBet ? 'bet' : 'skip'}`;
                
                card.innerHTML = `
                    <div class="match-header">
                        <div class="match-title">${match.home_team} vs ${match.away_team}</div>
                        <div class="match-time">🕒 ${timeStr}</div>
                    </div>
                    
                    <div class="odds-row">
                        <div class="odd-box">
                            <div class="label">Casa</div>
                            <div class="value">${match.odds_real.home.toFixed(2)}</div>
                        </div>
                        <div class="odd-box">
                            <div class="label">Pareggio</div>
                            <div class="value">${match.odds_real.draw.toFixed(2)}</div>
                        </div>
                        <div class="odd-box">
                            <div class="label">Trasferta</div>
                            <div class="value">${match.odds_real.away.toFixed(2)}</div>
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 15px; text-align: center; color: #666;">
                        <strong>🤖 Predizione:</strong> ${match.prediction.outcome} 
                        (${(match.prediction.confidence * 100).toFixed(1)}% confidenza)
                    </div>
                    
                    <div class="ev-row">
                        <div class="ev-box ${evs.home > 0 ? 'positive' : 'negative'}">
                            <div class="label">EV Casa</div>
                            <div class="value">${evs.home > 0 ? '+' : ''}${evs.home.toFixed(1)}%</div>
                        </div>
                        <div class="ev-box ${evs.draw > 0 ? 'positive' : 'negative'}">
                            <div class="label">EV Pareggio</div>
                            <div class="value">${evs.draw > 0 ? '+' : ''}${evs.draw.toFixed(1)}%</div>
                        </div>
                        <div class="ev-box ${evs.away > 0 ? 'positive' : 'negative'}">
                            <div class="label">EV Trasferta</div>
                            <div class="value">${evs.away > 0 ? '+' : ''}${evs.away.toFixed(1)}%</div>
                        </div>
                    </div>
                    
                    <div class="recommendation ${isBet ? 'bet' : 'skip'}">
                        <div class="icon">${isBet ? '✅' : '❌'}</div>
                        <div>
                            ${isBet 
                                ? `SCOMMETTI su ${bestOutcome}<br><div class="details">ROI atteso: +${bestEV.toFixed(1)}% • Con 100€ guadagni ${bestEV.toFixed(1)}€</div>` 
                                : `SKIP - Nessun valore<br><div class="details">Miglior EV: ${bestEV.toFixed(1)}% (negativo)</div>`
                            }
                        </div>
                    </div>
                    
                    <div style="margin-top: 15px; text-align: center; color: #999; font-size: 0.85em;">
                        📊 Quote da ${match.odds_real.n_bookmakers} bookmaker verificati
                    </div>
                `;
                
                container.appendChild(card);
            });
        }
        
        // Carica al load della pagina
        loadMatches();
        
        // Ricarica ogni 5 minuti
        setInterval(loadMatches, 5 * 60 * 1000);
    </script>
</body>
</html>
