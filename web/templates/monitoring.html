<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Monitoraggio Sistema Professionale</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .status-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .status-card h3 {
            margin-bottom: 15px;
            color: #4CAF50;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .metric {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .metric:last-child { border-bottom: none; }
        .value {
            font-weight: bold;
            color: #FFD700;
        }
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 10px;
        }
        .status-healthy { background: #4CAF50; }
        .status-warning { background: #FF9800; }
        .status-error { background: #F44336; }
        .refresh-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        .refresh-btn:hover {
            background: #45a049;
        }
        .loading {
            text-align: center;
            color: #FFD700;
            font-size: 18px;
            margin: 20px;
        }
        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #F44336;
            color: #FFB3BA;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .header-controls {
            margin-top: 15px;
        }
        .last-update-info {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Monitoraggio Sistema Professionale</h1>
            <p>Dashboard in tempo reale per il sistema di pronostici calcio</p>
            <div class="header-controls">
                <button class="refresh-btn" onclick="refreshAll()">🔄 Aggiorna Tutto</button>
                <button class="refresh-btn" onclick="testPrediction()">🔮 Test Predizione</button>
                <button class="refresh-btn" onclick="toggleAutoRefresh()">⏱️ Auto-Refresh</button>
            </div>
            <div id="last-update" class="last-update-info"></div>
        </div>

        <div class="status-grid">
            <!-- Health Status -->
            <div class="status-card">
                <h3>🏥 Stato Sistema <span id="health-indicator" class="status-indicator"></span></h3>
                <div id="health-content" class="loading">Caricamento...</div>
            </div>

            <!-- Performance Metrics -->
            <div class="status-card">
                <h3>📊 Performance Modelli</h3>
                <div id="metrics-content" class="loading">Caricamento...</div>
            </div>

            <!-- Database Status -->
            <div class="status-card">
                <h3>💾 Stato Database</h3>
                <div id="database-content" class="loading">Caricamento...</div>
            </div>

            <!-- Test Predizioni -->
            <div class="status-card">
                <h3>🔮 Test Predizioni</h3>
                <div id="prediction-content">
                    <button class="refresh-btn" onclick="testPrediction()">Testa Predizione</button>
                </div>
            </div>
        </div>

        <div class="status-card">
            <h3>📈 Accuratezza per Mercato</h3>
            <div id="accuracy-content" class="loading">Caricamento...</div>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;
        let autoRefreshEnabled = false;

        function updateLastUpdate() {
            document.getElementById('last-update').textContent = 
                `Ultimo aggiornamento: ${new Date().toLocaleString('it-IT')}`;
        }

        async function fetchHealth() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                
                const indicator = document.getElementById('health-indicator');
                const content = document.getElementById('health-content');
                
                if (data.status === 'healthy') {
                    indicator.className = 'status-indicator status-healthy';
                } else {
                    indicator.className = 'status-indicator status-error';
                }
                
                content.innerHTML = `
                    <div class="metric"><span>Status:</span><span class="value">${data.status}</span></div>
                    <div class="metric"><span>Sistema Inizializzato:</span><span class="value">${data.sistema_inizializzato ? '✅' : '❌'}</span></div>
                    <div class="metric"><span>Records Database:</span><span class="value">${data.database_records}</span></div>
                    <div class="metric"><span>Squadre Caricate:</span><span class="value">${data.squadre_caricate}</span></div>
                    <div class="metric"><span>Cache Entries:</span><span class="value">${data.cache_entries}</span></div>
                    <div class="metric"><span>Environment:</span><span class="value">${data.environment}</span></div>
                `;
            } catch (error) {
                document.getElementById('health-content').innerHTML = 
                    `<div class="error">Errore: ${error.message}</div>`;
                document.getElementById('health-indicator').className = 'status-indicator status-error';
            }
        }

        async function fetchMetrics() {
            try {
                const response = await fetch('/api/metrics_summary');
                const data = await response.json();
                
                const content = document.getElementById('metrics-content');
                content.innerHTML = `
                    <div class="metric"><span>Accuratezza Complessiva:</span><span class="value">${data.performance.accuratezza_complessiva}%</span></div>
                    <div class="metric"><span>Partite Analizzate:</span><span class="value">${data.performance.partite_analizzate}</span></div>
                    <div class="metric"><span>Predizioni Corrette:</span><span class="value">${data.performance.predizioni_corrette}</span></div>
                    <div class="metric"><span>Confidenza Media:</span><span class="value">${data.performance.confidenza_media}%</span></div>
                    <div class="metric"><span>Mercati Supportati:</span><span class="value">${data.performance.mercati_supportati}</span></div>
                `;

                const dbContent = document.getElementById('database-content');
                dbContent.innerHTML = `
                    <div class="metric"><span>Sistema Attivo:</span><span class="value">${data.stato_operativo.sistema_attivo ? '✅' : '❌'}</span></div>
                    <div class="metric"><span>Squadre Disponibili:</span><span class="value">${data.stato_operativo.squadre_disponibili}</span></div>
                    <div class="metric"><span>Cache Predizioni:</span><span class="value">${data.stato_operativo.cache_predizioni}</span></div>
                    <div class="metric"><span>Dataset Caricato:</span><span class="value">${data.stato_operativo.dataset_caricato ? '✅' : '❌'}</span></div>
                `;

                const accuracyContent = document.getElementById('accuracy-content');
                let accuracyHtml = '';
                for (const [mercato, stats] of Object.entries(data.mercati_principali)) {
                    accuracyHtml += `
                        <div class="metric">
                            <span>${mercato.replace('_', ' ').toUpperCase()}:</span>
                            <span class="value">${stats.accuratezza}% (${stats.confidenza})</span>
                        </div>
                    `;
                }
                accuracyContent.innerHTML = accuracyHtml;

            } catch (error) {
                document.getElementById('metrics-content').innerHTML = 
                    `<div class="error">Errore: ${error.message}</div>`;
            }
        }

        async function testPrediction() {
            const content = document.getElementById('prediction-content');
            content.innerHTML = '<div class="loading">Testando predizione...</div>';
            
            try {
                const response = await fetch('/api/predict_enterprise', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        home_team: 'Juventus',
                        away_team: 'Milan'
                    })
                });
                
                const data = await response.json();
                content.innerHTML = `
                    <div class="metric"><span>Test Match:</span><span class="value">Juventus vs Milan</span></div>
                    <div class="metric"><span>Predizione:</span><span class="value">${data.predizione}</span></div>
                    <div class="metric"><span>Probabilità:</span><span class="value">${data.probabilita.toFixed(1)}%</span></div>
                    <div class="metric"><span>Confidenza:</span><span class="value">${data.confidenza}</span></div>
                    <button class="refresh-btn" onclick="testPrediction()">🔄 Riresta</button>
                `;
            } catch (error) {
                content.innerHTML = `<div class="error">Errore test: ${error.message}</div>`;
            }
        }

        function refreshAll() {
            fetchHealth();
            fetchMetrics();
            updateLastUpdate();
        }

        function toggleAutoRefresh() {
            const btn = event.target;
            if (autoRefreshEnabled) {
                clearInterval(autoRefreshInterval);
                autoRefreshEnabled = false;
                btn.textContent = '⏱️ Auto-Refresh';
            } else {
                autoRefreshInterval = setInterval(refreshAll, 30000); // Ogni 30 secondi
                autoRefreshEnabled = true;
                btn.textContent = '⏸️ Stop Auto-Refresh';
            }
        }

        // Caricamento iniziale
        refreshAll();
    </script>
</body>
</html>
