<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronostici Enhanced - Sistema ML + Scraper</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            margin: 0;
            font-size: 2.5em;
            font-weight: 300;
        }
        
        .subtitle {
            margin: 10px 0 0 0;
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 4px solid #3498db;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            background: white;
            transition: border-color 0.3s;
        }
        
        select:focus {
            outline: none;
            border-color: #3498db;
        }
        
        .btn {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
        }
        
        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .results {
            margin-top: 30px;
            display: none;
        }
        
        .prediction-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .prediction-header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
        }
        
        .match-title {
            font-size: 1.5em;
            color: #2c3e50;
            margin: 0;
        }
        
        .prediction-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .prediction-box {
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .base-prediction {
            background: #ecf0f1;
            border: 2px solid #bdc3c7;
        }
        
        .enhanced-prediction {
            background: linear-gradient(135deg, #e8f8f5 0%, #d5f4e6 100%);
            border: 2px solid #27ae60;
        }
        
        .prediction-label {
            font-size: 0.9em;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .prediction-result {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .prediction-confidence {
            font-size: 1.1em;
            opacity: 0.8;
        }
        
        .probabilities {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .prob-item {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
        
        .prob-label {
            font-size: 0.9em;
            color: #6c757d;
            margin-bottom: 5px;
        }
        
        .prob-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .enhancement-factors {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .factors-title {
            font-weight: 600;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        
        .factor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }
        
        .factor-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #dee2e6;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1em;
            color: #7f8c8d;
        }
        
        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        
        .error {
            background: #ffe6e6;
            color: #d32f2f;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #d32f2f;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .prediction-comparison {
                grid-template-columns: 1fr;
            }
            
            .probabilities {
                grid-template-columns: 1fr;
            }
            
            .factor-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔮 Pronostici Enhanced</h1>
            <p class="subtitle">Sistema ML + Scraper in Tempo Reale</p>
        </div>
        
        <div class="content">
            <div class="form-section">
                <form id="predictionForm">
                    <div class="form-group">
                        <label for="homeTeam">Squadra di Casa:</label>
                        <select id="homeTeam" required>
                            <option value="">Seleziona squadra casa...</option>
                            <option value="Atalanta">Atalanta</option>
                            <option value="Bologna">Bologna</option>
                            <option value="Cagliari">Cagliari</option>
                            <option value="Como">Como</option>
                            <option value="Cremonese">Cremonese</option>
                            <option value="Fiorentina">Fiorentina</option>
                            <option value="Genoa">Genoa</option>
                            <option value="Inter">Inter</option>
                            <option value="Juventus">Juventus</option>
                            <option value="Lazio">Lazio</option>
                            <option value="Lecce">Lecce</option>
                            <option value="Milan">Milan</option>
                            <option value="Napoli">Napoli</option>
                            <option value="Parma">Parma</option>
                            <option value="Pisa">Pisa</option>
                            <option value="Roma">Roma</option>
                            <option value="Sassuolo">Sassuolo</option>
                            <option value="Torino">Torino</option>
                            <option value="Udinese">Udinese</option>
                            <option value="Verona">Verona</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="awayTeam">Squadra in Trasferta:</label>
                        <select id="awayTeam" required>
                            <option value="">Seleziona squadra trasferta...</option>
                            <option value="Atalanta">Atalanta</option>
                            <option value="Bologna">Bologna</option>
                            <option value="Cagliari">Cagliari</option>
                            <option value="Como">Como</option>
                            <option value="Cremonese">Cremonese</option>
                            <option value="Fiorentina">Fiorentina</option>
                            <option value="Genoa">Genoa</option>
                            <option value="Inter">Inter</option>
                            <option value="Juventus">Juventus</option>
                            <option value="Lazio">Lazio</option>
                            <option value="Lecce">Lecce</option>
                            <option value="Milan">Milan</option>
                            <option value="Napoli">Napoli</option>
                            <option value="Parma">Parma</option>
                            <option value="Pisa">Pisa</option>
                            <option value="Roma">Roma</option>
                            <option value="Sassuolo">Sassuolo</option>
                            <option value="Torino">Torino</option>
                            <option value="Udinese">Udinese</option>
                            <option value="Verona">Verona</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn" id="predictBtn">
                        🔍 Analizza e Predici
                    </button>
                </form>
            </div>
            
            <div id="results" class="results"></div>
        </div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const homeTeam = document.getElementById('homeTeam').value;
            const awayTeam = document.getElementById('awayTeam').value;
            const resultsDiv = document.getElementById('results');
            const predictBtn = document.getElementById('predictBtn');
            
            if (!homeTeam || !awayTeam) {
                alert('Seleziona entrambe le squadre');
                return;
            }
            
            if (homeTeam === awayTeam) {
                alert('Le squadre devono essere diverse');
                return;
            }
            
            // Mostra loading
            predictBtn.disabled = true;
            predictBtn.textContent = '🔄 Analizzando...';
            
            resultsDiv.style.display = 'block';
            resultsDiv.innerHTML = `
                <div class="prediction-card">
                    <div class="loading">
                        Raccolta dati in tempo reale per ${homeTeam} vs ${awayTeam}
                    </div>
                </div>
            `;
            
            try {
                const response = await fetch('/predict_enhanced', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        home_team: homeTeam,
                        away_team: awayTeam
                    })
                });
                
                const data = await response.json();
                
                // Gestione specifica per errori 400 con messaggi informativi
                if (!response.ok) {
                    if (response.status === 400 && data.error) {
                        throw new Error(data.error);
                    }
                    throw new Error(`Errore HTTP ${response.status}`);
                }
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                displayResults(data);
                
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="prediction-card">
                        <div class="error">
                            Errore durante la predizione: ${error.message}
                        </div>
                    </div>
                `;
            } finally {
                predictBtn.disabled = false;
                predictBtn.textContent = '🔍 Analizza e Predici';
            }
        });
        
        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.innerHTML = `
                <div class="prediction-card">
                    <div class="prediction-header">
                        <h2 class="match-title">${data.partita}</h2>
                    </div>
                    
                    <div class="prediction-comparison">
                        <div class="prediction-box base-prediction">
                            <div class="prediction-label">Modello Base</div>
                            <div class="prediction-result">${data.predizione_base}</div>
                            <div class="prediction-confidence">${data.confidenza_base}%</div>
                        </div>
                        
                        <div class="prediction-box enhanced-prediction">
                            <div class="prediction-label">Enhanced + Scraper</div>
                            <div class="prediction-result">${data.predizione_enhanced}</div>
                            <div class="prediction-confidence">${data.confidenza_enhanced}%</div>
                        </div>
                    </div>
                    
                    <h3>Probabilità Enhanced:</h3>
                    <div class="probabilities">
                        <div class="prob-item">
                            <div class="prob-label">Casa</div>
                            <div class="prob-value">${data.probabilita_enhanced.vittoria_casa}%</div>
                        </div>
                        <div class="prob-item">
                            <div class="prob-label">Pareggio</div>
                            <div class="prob-value">${data.probabilita_enhanced.pareggio}%</div>
                        </div>
                        <div class="prob-item">
                            <div class="prob-label">Trasferta</div>
                            <div class="prob-value">${data.probabilita_enhanced.vittoria_trasferta}%</div>
                        </div>
                    </div>
                    
                    <div class="enhancement-factors">
                        <div class="factors-title">🔧 Fattori di Enhancement:</div>
                        <div class="factor-grid">
                            <div class="factor-item">
                                <span>Casa:</span>
                                <span>${data.fattori_enhancement.enhancement_casa}</span>
                            </div>
                            <div class="factor-item">
                                <span>Trasferta:</span>
                                <span>${data.fattori_enhancement.enhancement_trasferta}</span>
                            </div>
                            <div class="factor-item">
                                <span>Meteo:</span>
                                <span>${data.dati_scraped.meteo.condizione || 'N/A'}</span>
                            </div>
                            <div class="factor-item">
                                <span>Temperatura:</span>
                                <span>${data.dati_scraped.meteo.temperatura || 'N/A'}°C</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
