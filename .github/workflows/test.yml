name: Tests & Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run tests with coverage
        env:
          FLASK_ENV: testing
          ODDS_API_KEY: test_key_for_ci
          DATABASE_URL: ""
        run: |
          python -m pytest tests/ \
            --cov=web \
            --cov=database \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=30 \
            -v \
            --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          flags: unittests
          name: codecov-pronostici-calcio
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage Summary
        run: |
          echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python -m pytest tests/ \
            --cov=web \
            --cov=database \
            --cov-report=term >> $GITHUB_STEP_SUMMARY

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Run flake8
        run: |
          flake8 web/ database/ tests/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503,E501,F401,F841,W291,W293,E402,F811,F824,F541 \
            --exclude=__pycache__,*.pyc,.git,migrations,venv

      # Black/isort check temporaneamente disabilitati - re-enable dopo style fix PR
      # - name: Check Black formatting
      #   run: |
      #     black --check web/ database/ tests/ \
      #       --extend-exclude="migrations|venv|__pycache__"

      # - name: Check import sorting
      #   run: |
      #     isort --check-only web/ database/ tests/ \
      #       --skip migrations --skip venv

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          bandit -r web/ database/ \
            -f json -o bandit-report.json \
            --skip B101,B601 \
            --exit-zero

      - name: Security scan summary
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Security scan completed" >> $GITHUB_STEP_SUMMARY
