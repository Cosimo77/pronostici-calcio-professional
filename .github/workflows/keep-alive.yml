name: Keep Render Alive

on:
  schedule:
    # Ping ogni 10 minuti (evita sleep di 15 min)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Trigger manuale

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Render App
        run: |
          echo "🏓 Pinging Render app..."
          response=$(curl -s -w "\n%{http_code}" https://pronostici-calcio-pro.onrender.com/health)
          http_code=$(echo "$response" | tail -1)
          echo "Response code: $http_code"
          if [ "$http_code" = "200" ]; then
            echo "✅ App is alive"
          else
            echo "⚠️ App responded with code $http_code (might be waking up)"
          fi
