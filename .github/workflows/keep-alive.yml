name: Keep Render Alive & Auto Training

on:
  schedule:
    # Ping ogni 10 minuti (evita sleep di 15 min)
    - cron: '*/10 * * * *'
    # Training modelli ogni giorno alle 3:00 AM UTC (4:00 AM Italia)
    - cron: '0 3 * * *'
  workflow_dispatch: # Trigger manuale

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    if: github.event.schedule != '0 3 * * *'
    
    steps:
      - name: Ping Render App
        run: |
          echo "🏓 Pinging Render app..."
          curl -f https://pronostici-calcio-pro.onrender.com/health || echo "⚠️ App might be sleeping"
          
  auto-train:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Download Latest Data
        run: |
          echo "📥 Downloading latest Serie A data..."
          python3 scripts/aggiorna_stagione_corrente.py
          
      - name: Train Models
        run: |
          echo "🤖 Training ML models..."
          python3 allena_modelli_rapido.py
          
      - name: Commit Updated Models
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add models/ data/
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-train: Updated models $(date +'%Y-%m-%d %H:%M')"
          git push origin main || echo "Nothing to commit"
          
      - name: Trigger Render Deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            echo "🚀 Triggering Render deploy..."
            curl -X POST "$RENDER_DEPLOY_HOOK"
          else
            echo "⚠️ RENDER_DEPLOY_HOOK secret not configured"
          fi
