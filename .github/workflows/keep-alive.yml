name: Keep Render Alive

on:
  schedule:
    # Ping ogni 10 minuti (evita sleep di 15 min)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Trigger manuale

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Render App
        run: |
          echo "🏓 Pinging Render app..."
          curl -f https://pronostici-calcio-pro.onrender.com/health || echo "⚠️ App might be sleeping"
