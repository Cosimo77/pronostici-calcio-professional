name: Aggiornamento Automatico Dati

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install pandas requests
      
      - name: Download nuovi dati
        run: python3 scripts/auto_download_data.py
      
      - name: Commit nuovi dati
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          ADDED=$(cat update_info.txt 2>/dev/null || echo "0")
          if [ "$ADDED" -gt 0 ]; then
            git add data/dataset_pulito.csv data/dataset_features.csv
            git commit -m "Auto-update: +${ADDED} partite Serie A"
            git push
          else
            echo "Nessun aggiornamento necessario"
          fi
      
      - name: Reload Render
        if: success()
        run: curl -X POST -s https://pronostici-calcio-professional.onrender.com/api/automation/force_update
