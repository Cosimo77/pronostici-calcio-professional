name: Aggiornamento Automatico Dati

on:
  schedule:
    - cron: '0 5 * * *'  # Ogni giorno alle 05:00 UTC (06:00 ITA)
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 📊 Trigger aggiornamento dati Render
        run: |
          echo "🔄 Avvio aggiornamento automatico..."
          response=$(curl -X POST -w "\n%{http_code}" -s https://pronostici-calcio-professional.onrender.com/api/automation/force_update)
          http_code=$(echo "$response" | tail -n1)
          if [ "$http_code" -eq 200 ]; then
            echo "✅ Aggiornamento completato!"
          else
            echo "❌ Errore HTTP $http_code"
            exit 1
          fi
