<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Test Debug Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; }
        .error { background-color: #f8d7da; }
    </style>
</head>
<body>
    <h1>Debug Dashboard Endpoints</h1>
    <div id="results"></div>

    <script>
        const endpoints = [
            '/api/status',
            '/api/health', 
            '/api/automation',
            '/api/data-status',
            '/api/logs'
        ];

        const resultsDiv = document.getElementById('results');

        function addResult(endpoint, success, data) {
            const div = document.createElement('div');
            div.className = `result ${success ? 'success' : 'error'}`;
            div.innerHTML = `
                <h3>${endpoint}</h3>
                <p><strong>Status:</strong> ${success ? 'SUCCESS' : 'ERROR'}</p>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;
            resultsDiv.appendChild(div);
        }

        async function testEndpoint(endpoint) {
            try {
                console.log(`Testing ${endpoint}...`);
                const response = await fetch(endpoint);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    throw new Error(`Expected JSON, got: ${contentType}`);
                }
                
                const data = await response.json();
                addResult(endpoint, true, data);
                console.log(`✅ ${endpoint} OK:`, data);
                
            } catch (error) {
                addResult(endpoint, false, { error: error.message });
                console.error(`❌ ${endpoint} ERROR:`, error);
            }
        }

        async function runTests() {
            for (const endpoint of endpoints) {
                await testEndpoint(endpoint);
                await new Promise(resolve => setTimeout(resolve, 500));
            }
        }

        // Avvia test automaticamente
        runTests();
    </script>
</body>
</html>
