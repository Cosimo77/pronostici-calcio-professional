# Docker Compose per Stack Enterprise Completo
version: '3.8'

services:
  # ============================================
  # APPLICAZIONE PRINCIPALE
  # ============================================
  app:
    build: 
      context: .
      dockerfile: Dockerfile
      args:
        APP_ENV: ${FLASK_ENV:-production}
    container_name: pronostici-calcio-app
    restart: unless-stopped
    ports:
      - "${PORT:-5008}:5008"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/pronostici_calcio}
      - REDIS_URL=redis://redis:6379/0
      - RATE_LIMIT_STORAGE_URL=redis://redis:6379/1
    volumes:
      - ./data:/app/data:ro
      - ./logs:/app/logs
      - ./cache:/app/cache
    depends_on:
      - db
      - redis
    networks:
      - pronostici-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5008/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================
  # DATABASE POSTGRESQL
  # ============================================
  db:
    image: postgres:15-alpine
    container_name: pronostici-calcio-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=pronostici_calcio
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - pronostici-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d pronostici_calcio"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # REDIS PER CACHING E RATE LIMITING  
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: pronostici-calcio-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - pronostici-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================
  # NGINX REVERSE PROXY & LOAD BALANCER
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: pronostici-calcio-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80" 
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - pronostici-network

  # ============================================
  # MONITORING STACK
  # ============================================
  
  # Prometheus per metriche
  prometheus:
    image: prom/prometheus:latest
    container_name: pronostici-calcio-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - pronostici-network

  # Grafana per dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: pronostici-calcio-grafana  
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - pronostici-network

# ============================================
# NETWORKS & VOLUMES
# ============================================
networks:
  pronostici-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local