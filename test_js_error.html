<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Test JavaScript Error</title>
    <meta name="description" content="Pagina di test per verificare errori JS e risposte API">
</head>
<body>
    <h1>Test per errore JavaScript</h1>
    <button onclick="testAPI()">Test API Call</button>
    <div id="result"></div>
    
    <script>
        async function testAPI() {
            try {
                console.log('Test API call...');
                
                // Test che potrebbe causare l'errore "Unexpected token '<'"
                const response = await fetch('/api/status');
                const contentType = response.headers.get('content-type');
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                if (!contentType || !contentType.includes('application/json')) {
                    throw new Error('Risposta non JSON: ' + contentType);
                }
                const data = await response.json();
                
                document.getElementById('result').innerHTML = 
                    '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                console.log('✅ Test API OK:', data);
                
            } catch (error) {
                console.error('❌ Errore JavaScript:', error);
                document.getElementById('result').innerHTML = 
                    '<span style="color: red;">ERRORE: ' + (error.message || error) + '</span>';
            }
        }
        
        // Test automatico al caricamento
        window.addEventListener('load', () => {
            console.log('Pagina caricata, test automatico...');
            testAPI();
        });
    </script>
</body>
</html>
